[env:esp32s3]
; Use official espressif32 platform (modern version with ESP32-S3 support)
platform = espressif32@^6
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 921600

; Board has 4MB flash (Super Mini)
board_build.flash_size = 4MB
board_build.partitions = default.csv
board_upload.flash_size = 4MB

; Enable USB CDC serial over the native USB-C port
build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1

; For this env, use the original streaming firmware in main.cpp only
src_filter = +<main.cpp> -<ei_main.cpp>

[env:esp32s3_ei]
; Environment to run Edge Impulse FireAlarm_Detector_ML continuous microphone example
platform = espressif32@^6
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

board_build.flash_size = 4MB
board_build.partitions = default.csv
board_upload.flash_size = 4MB

build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1

; Only compile ei_main.cpp for this env (and not main.cpp)
src_filter = +<ei_main.cpp> -<main.cpp>
