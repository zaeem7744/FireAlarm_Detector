; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32s3

[env]
; Use official espressif32 platform (modern version with ESP32-S3 support)
platform = espressif32@^6
framework = arduino
monitor_speed = 115200

lib_deps =
    blynkkk/Blynk@1.3.2
    adafruit/Adafruit NeoPixel
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
 
build_flags =
    -Werror=return-type     ; Fail on return type error
    -DCORE_DEBUG_LEVEL=0    ; Reduce build size
    -DBLYNK_USE_LITTLEFS

#build_type = debug
#monitor_filters = esp32_exception_decoder

board_build.filesystem = littlefs

[env:esp32]
board = esp32dev
board_build.partitions = boards/partitions/partitions_4M.csv
upload_speed = 921600

[env:esp32c3]
board = esp32-c3-devkitm-1
board_build.partitions = boards/partitions/partitions_4M.csv
upload_speed = 460800

[env:esp32s2]
board = featheresp32-s2
board_build.partitions = boards/partitions/partitions_4M.csv

[env:esp32s3]
; ESP32-S3 Super Mini (4MB flash)
board = esp32-s3-devkitc-1
board_build.flash_size = 4MB
board_build.partitions = default.csv
board_upload.flash_size = 4MB
upload_speed = 921600

; Enable USB CDC serial over the native USB port, same as working project
build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1

